<!DOCTYPE html>
<html lang="en">
<head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Form</title>
</head>
<body>
          <form action="">
                    <fieldset>
                              <legend>HTML FORM</legend>
                 <h1>Event Registration</h1><br>
                 <label for="name">Name:</label><br>
                 <input type="text" id="name"><br>
                 <br>
                 <label for="email">Email:</label><br>
                 <input type="email" id="email"><br>
                 <br>
                 <label for="phone">Phone:</label><br>
                 <input type="tel" id="phone"><br>
                 <br>
                 <label for="occupation">occupation:</label><br><br>
                 <select name="occupation" id="occupation"><br>
                    <option value="job">job</option>
                    <option value="buisness">buisness</option>
                    <option value="other" >other</option>
                 </select>
                 <br><br>
                 <label for="Topic of interest">Topic of interest:</label><br><br>
                
                 <input type="checkbox" id="html">
                  <label for="html">HTML</label><br><br>

                 <input type="checkbox" id="css">
                  <label for="css">CSS</label><br><br>

                 <input type="checkbox" id="js">
                  <label for="js">JS</label><br><br>
                  
                  <label for="comments">comments</label><br>
                  <textarea name="comments" id="comments"></textarea>
                  <br><br>
                  <label for="file">Choose file</label>
                  <input type="file"><br><br>
                  <button type="submit">Register</button>
</fieldset>
          </form>
</body>
</html>
