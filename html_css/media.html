<!DOCTYPE html>
<html lang="en">
<head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>media</title>
          <style>
                    .container{
                              border: 2px solid black;
                              background-color: rgb(198, 175, 179);
                              display: flex;
                              flex-direction: row;
                              width: 480px;

                    }
                    #boxleft{
                              background-color: blue;
                              border: 1px solid rgb(202, 32, 162);
                              width: 47%;
                              margin: 3px;
                              padding:5px;
                    }
                    #boxright{
                              background-color: blueviolet;
                              border: 1px solid rgb(147, 226, 43);
                              width: 47%;
                              margin: 3px;
                              padding:5px
                    }
                    p{
                              border: 1px solid red;
                    }
                    @media (max-width:640px){
                              .container{
                                        flex-direction: column;
                              }
                    }
          </style>
</head>
<body>
          <div class="container">
                    <div class="box" id="boxleft">
                                <p>text  1</p>
                    <p>text  2</p>
                    </div>
                  
                    <div class="box" id="boxright">
                              <img src="images/bird-colorful-gradient-design-vector_343694-2506.avif" alt="" height="50px" width="50px">
                    </div>
                
          </div>
          
</body>
</html>
