<!DOCTYPE html>
<html lang="en">
<head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Animation</title>
          <style>
                    *{
                              margin: 0%;
                              padding: 0%;
                              box-sizing: border-box;
                    }
                    .container{
                              height: 100vh;
                              width:100vw;
                              background-color: beige;
                              border: 5px solid black;

                    }
                    .box{
                              width: 350px;
                              height: 80px;
                              border-radius: 10px;
                              margin: 10px;
                              background-color: blue;
                              border: 5px solid rgb(161, 148, 157);
                              position: relative;
                              animation: rightMovement 3s ease-in-out 1s infinite alternate backwards;
                              /* animation-name: rightMovement;
                              animation-duration: 5s;
                              animation-iteration-count: 1;
                              animation-timing-function: linear;
                              animation-direction: alternate;
                              animation-fill-mode:backwards ; */


                    }
                    @keyframes rightMovement {
                              from{
                                        top: 0;
                                        left:0;
                              }
                              to{
                                        top:0;
                                        left: 1150px;
                              }
                              
                    }
                    #box2{
                              animation: leftMovement 3s ease-in-out 1s infinite alternate backwards;

                    }
                    @keyframes leftMovement {
                              from{
                                        top:400px;
                                        left:1150px;
                              }
                              to{
                                        top:400px;
                                        left:0px;
                              }
                    }
                    .circle{
                               width: 100px;
                              height: 100px;
                              border-radius: 50px;
                              margin: 0px;
                              background-color: blue;
                              border: 5px solid rgb(161, 148, 157);
                              position: relative;
                              top: 140px;
                              left: 675px;
                               animation: circleMovement 3s ease-in-out 0s infinite alternate-reverse backwards;

                    }
                    @keyframes circleMovement {
                              0%{
                                        top:1%;
                                        left:5%;

                              }
                              35%{
                                         top:38%;
                                        left:90%;
                              }
                              75%{
                                         top:50%;
                                        left:30%;

                              }
                              100%{
                                         top:75%;
                                        left:15%;

                              }
                    }
          </style>
</head>
<body>
          <div class="container">
                    <div class="box">

                    </div>

                    <div class="circle">

                    </div>

                    <div class="box" id="box2">

                    </div>

          </div>
</body>
</html>
