<!DOCTYPE html>
<html lang="en">
<head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Flexbox</title>
          <style>
                    *{
                              margin: 0px;
                              padding: 0px;
                    }
                    .container{
                              background-color: beige;
                              border: 5px solid black;
                               margin:2px;
                               height: 1000px;

                      padding:2px;
                      display: flex;
                      /* flex-direction: row;
                      flex-wrap: wrap; */
                      flex-flow: row wrap;
                      justify-content: space-between;
                      justify-content: start;
                      align-items: start;
                      align-content: start;
           
                              

                              
                              
                    }
                    .box{
                      width: 150px;
                      height:150px;
                      border:2px solid brown;
                      margin:2px;
                      padding:2px;
                    }
                    #box1{
                               

                              
                              background-color: brown;
                      
                    }
                    #box2{
                              
                              background-color: rgb(69, 24, 191);

                             
                      
                              
                    }
                    #box3{
 
                             
                             
                              background-color: rgb(42, 165, 93);

                              
                      
                    }
                    #box4{
                              
                              background-color: rgb(240, 160, 63);

                       
                      

                    }
          </style>
</head>
<body>
          <div class="container">
                   <div class="box" id="box1"></div>
                   <div class="box" id="box2"></div>
                   <div class="box" id="box3"></div>
                   <div class="box" id="box4"></div>
          </div>
</body>
</html>
