<script>

          let percentage=prompt("enter ur message:");
switch (true) {
    case (percentage >= 80 && percentage <= 100):
        alert("Grade A");
        break;

    case (percentage >= 60 && percentage < 80):
        alert("Grade B");
        break;

    case (percentage >= 45 && percentage < 60):
        alert("Grade C");
        break;

    case (percentage >= 33 && percentage < 45):
        alert("Grade D");
        break;

    case (percentage >= 0 && percentage < 33):
        alert("Fail,enjoy ");
        break;

    default:
        alert("invalid input");
}
</script>
